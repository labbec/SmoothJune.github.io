<style>
:root {
    --primary-text: #0f172a; 
    --secondary-text: #1e293b;
    --accent-color: #50817e; 
    --nav-color: #50817e;
  }

  .glass-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    z-index: 1030;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  .glass-navbar .nav-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 32px; 
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .glass-navbar .nav-brand {
    font-family:  Georgia, sans-serif;
    font-size: 24px; 
    font-weight: 700;
    color: var(--primary-text);
    text-decoration: none;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  
  .glass-navbar .nav-brand:hover {
    color: var(--primary-text);
    text-decoration: none;
  }

  .glass-navbar .nav-links {
    display: flex;
    gap: 32px; 
    margin: 0;
    padding: 0;
    align-items: center;
  }

  .glass-navbar .nav-links a {
    text-decoration: none;
    color: var(--nav-color);
    font-weight: 600;
    font-size: 15px; 
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.2s ease;
  }

  .glass-navbar .nav-links a:hover {
    color: var(--accent-color);
    text-decoration: none;
  }

  /* REGISTRATION BUTTON */
  .btn-register {
    display: inline-block;
    background-color: var(--accent-color);
    color: #ffffff;
    padding: 16px 40px;
    font-size: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 30px;
    text-decoration: none;
    transition: background-color 0.3s ease, transform 0.2s ease;
    margin-top: 20px;
    box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
  }

  .btn-register:hover {
    background-color: lightblue; 
    color: #ffffff;
    text-decoration: none;
    transform: translateY(-2px);
  }

  /*  LOGOS SECTION  */
  .logos-section {
    margin-top: 3rem;
    margin-bottom: 3rem;
    margin-left: 1rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(0,0,0,0.1);
  }

  .logos-section h4 {
    font-size: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--secondary-text);
    margin-top: 0;
    margin-bottom: 24px;
    font-weight: 700;
    text-align: center;
  }

  .logos-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 64px;
    flex-wrap: wrap; 
  }

  .sponsor-logo {
    max-height: 70px; 
    max-width: 250px;
    object-fit: contain;
    opacity: 0.6;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .sponsor-logo:hover {
    opacity: 1;
    transform: scale(1.05);
  }

  /* Responsive Adjustments */
  @media (max-width: 900px) {
    .logos-container { gap: 32px; }
    .glass-navbar .nav-container { flex-direction: column; gap: 16px; padding: 16px; }
    .glass-navbar .nav-links { flex-wrap: wrap; justify-content: center; gap: 16px; }
  }
</style>

                    Registration for the workshop is currently open. Registration is free, but mandatory.<br> To join us in Paris, please complete your attendee profile by filling out our official registration form.
